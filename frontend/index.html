<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Northwind Expense Pre-Review</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
  .spin { border-top-color: transparent; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen">

<header class="bg-slate-900 text-white">
  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
    <div>
      <h1 class="text-lg font-semibold">Northwind Logistics — Expense Pre-Review</h1>
      <p class="text-slate-400 text-xs">AI-assisted compliance review · a human makes the final call</p>
    </div>
    <nav class="flex gap-1 text-sm">
      <button data-tab="new"     class="tab px-3 py-1.5 rounded-md">New submission</button>
      <button data-tab="history" class="tab px-3 py-1.5 rounded-md">History</button>
      <button data-tab="qa"      class="tab px-3 py-1.5 rounded-md">Policy Q&amp;A</button>
    </nav>
  </div>
</header>

<main class="max-w-6xl mx-auto px-6 py-6">
  <section id="view-new"></section>
  <section id="view-history" class="hidden"></section>
  <section id="view-qa" class="hidden"></section>
</main>

<!-- Override dialog -->
<div id="ovl" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-5">
    <h3 class="font-semibold mb-1">Override verdict</h3>
    <p class="text-xs text-slate-500 mb-3" id="ovl-sub"></p>
    <label class="block text-sm mb-1">New verdict</label>
    <select id="ovl-verdict" class="w-full border rounded-md p-2 mb-3 text-sm">
      <option value="compliant">Compliant</option>
      <option value="flagged">Flagged</option>
      <option value="rejected">Rejected</option>
      <option value="needs_info">Needs info</option>
    </select>
    <label class="block text-sm mb-1">Comment (required, audited)</label>
    <textarea id="ovl-comment" rows="3" class="w-full border rounded-md p-2 mb-4 text-sm"
      placeholder="Why are you overriding the system?"></textarea>
    <div class="flex justify-end gap-2">
      <button onclick="closeOverride()" class="px-3 py-1.5 text-sm rounded-md border">Cancel</button>
      <button onclick="submitOverride()" class="px-3 py-1.5 text-sm rounded-md bg-slate-900 text-white">Save override</button>
    </div>
  </div>
</div>

<script>
const API = "";  // same origin
const $ = (s, r=document) => r.querySelector(s);
const money = v => (v==null ? "—" : "$" + Number(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}));
const esc = s => (s??"").toString().replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

const VERDICT = {
  compliant:  {label:"Compliant",  badge:"bg-emerald-100 text-emerald-800 border-emerald-300", card:"border-emerald-200", dot:"bg-emerald-500"},
  flagged:    {label:"Flagged",    badge:"bg-amber-100 text-amber-800 border-amber-300",       card:"border-amber-300 bg-amber-50", dot:"bg-amber-500"},
  rejected:   {label:"Rejected",   badge:"bg-rose-100 text-rose-800 border-rose-300",          card:"border-rose-300 bg-rose-50",   dot:"bg-rose-500"},
  needs_info: {label:"Needs info", badge:"bg-slate-200 text-slate-700 border-slate-300",       card:"border-slate-300 bg-slate-50", dot:"bg-slate-400"},
};
const vmeta = v => VERDICT[v] || VERDICT.needs_info;

async function api(path, opts) {
  const r = await fetch(API + path, opts);
  if (!r.ok) { const t = await r.text(); throw new Error(`${r.status}: ${t}`); }
  return r.json();
}

// ---------- tabs ----------
let employees = [];
function showTab(tab) {
  for (const el of document.querySelectorAll(".tab"))
    el.className = "tab px-3 py-1.5 rounded-md " + (el.dataset.tab===tab ? "bg-white text-slate-900" : "text-slate-300 hover:bg-slate-800");
  $("#view-new").classList.toggle("hidden", tab!=="new");
  $("#view-history").classList.toggle("hidden", tab!=="history");
  $("#view-qa").classList.toggle("hidden", tab!=="qa");
  if (tab==="history") loadHistory();
}
document.querySelectorAll(".tab").forEach(b => b.onclick = () => showTab(b.dataset.tab));

// ---------- new submission ----------
function empOption(e){ return `<option value="${e.id}">${esc(e.name)} · G${e.grade} · ${esc(e.title)}</option>`; }

async function renderNew() {
  employees = await api("/api/employees");
  $("#view-new").innerHTML = `
    <div class="bg-white rounded-lg shadow-sm p-5 mb-5">
      <h2 class="font-semibold mb-3">Start a submission</h2>
      <div class="grid md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm mb-1">Employee</label>
          <select id="emp" class="w-full border rounded-md p-2 text-sm">${employees.map(empOption).join("")}</select>
          <div id="emp-ctx" class="text-xs text-slate-500 mt-2"></div>
          <button id="toggle-new-emp" class="text-xs text-blue-600 mt-2">+ New employee</button>
          <div id="new-emp" class="hidden mt-3 space-y-2 border-t pt-3"></div>
        </div>
        <div>
          <label class="block text-sm mb-1">Receipts (PDF, image, or text — mixed OK)</label>
          <input id="files" type="file" multiple accept=".pdf,.png,.jpg,.jpeg,.webp,.gif,.txt"
            class="w-full border rounded-md p-2 text-sm bg-slate-50" />
          <p class="text-xs text-slate-400 mt-1">Each receipt is one line item.</p>
          <button id="run" class="mt-3 px-4 py-2 rounded-md bg-slate-900 text-white text-sm">Run pre-review</button>
        </div>
      </div>
    </div>
    <div id="results"></div>`;
  $("#emp").onchange = renderEmpCtx; renderEmpCtx();
  $("#toggle-new-emp").onclick = toggleNewEmp;
  $("#run").onclick = runSubmission;
}
function selectedEmp(){ return employees.find(e => e.id == $("#emp").value); }
function renderEmpCtx(){
  const e = selectedEmp(); if(!e) return;
  $("#emp-ctx").innerHTML = `<b>${esc(e.department)}</b> · ${esc(e.home_base)}<br>
    <b>Trip:</b> ${esc(e.trip_purpose)||"—"}<br><b>Dates:</b> ${esc(e.trip_dates)||"—"}`;
}
function toggleNewEmp(){
  const d = $("#new-emp"); d.classList.toggle("hidden");
  if(!d.dataset.init){ d.dataset.init=1; d.innerHTML = `
    ${["name","title","department","home_base","trip_purpose","trip_dates"].map(f=>
      `<input data-f="${f}" placeholder="${f.replace('_',' ')}" class="w-full border rounded-md p-1.5 text-sm"/>`).join("")}
    <input data-f="grade" type="number" placeholder="grade (1-10)" class="w-full border rounded-md p-1.5 text-sm"/>
    <button id="save-emp" class="px-3 py-1.5 rounded-md bg-blue-600 text-white text-sm">Create &amp; select</button>`;
    $("#save-emp").onclick = createEmp;
  }
}
async function createEmp(){
  const body = {}; $("#new-emp").querySelectorAll("[data-f]").forEach(i => body[i.dataset.f]=i.value);
  body.grade = parseInt(body.grade||"5",10);
  const e = await api("/api/employees",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  employees.push(e); $("#emp").insertAdjacentHTML("beforeend", empOption(e)); $("#emp").value=e.id;
  $("#new-emp").classList.add("hidden"); renderEmpCtx();
}

async function runSubmission(){
  const files = $("#files").files;
  if(!files.length){ alert("Choose at least one receipt."); return; }
  const fd = new FormData();
  fd.append("employee_pk", $("#emp").value);
  fd.append("label", selectedEmp()?.trip_purpose || "");
  for(const f of files) fd.append("files", f);
  $("#results").innerHTML = spinner("Extracting receipts and checking each against policy…");
  try {
    const sub = await api("/api/submissions",{method:"POST",body:fd});
    currentSubId = sub.id; inNewView = true;
    $("#results").innerHTML = renderSubmission(sub);
  } catch(e){
    $("#results").innerHTML = errorBox(e.message);
  }
}

// ---------- rendering a submission ----------
function spinner(msg){ return `<div class="flex items-center gap-3 text-slate-500 p-6">
  <div class="spin w-5 h-5 border-2 border-slate-400 rounded-full"></div>${esc(msg)}</div>`; }
function errorBox(msg){
  const quota = /429|quota/i.test(msg);
  return `<div class="bg-rose-50 border border-rose-200 text-rose-800 rounded-md p-4 text-sm">
    <b>${quota?"Rate limit reached":"Something went wrong"}</b><br>${esc(msg)}</div>`; }

function summaryBar(s){
  return `<div class="flex flex-wrap gap-4 items-center bg-white rounded-lg shadow-sm p-4 mb-4 text-sm">
    <div><span class="text-slate-400">Employee</span> <b>${esc(s.employee?.name||"")}</b></div>
    <div><span class="text-slate-400">Status</span> <b>${esc(s.status)}</b></div>
    <div><span class="text-slate-400">Items</span> <b>${s.line_item_count}</b></div>
    <div><span class="text-slate-400">Flagged</span> <b class="${s.flagged_count?'text-amber-700':''}">${s.flagged_count}</b></div>
    <div class="ml-auto text-right"><span class="text-slate-400">Reimbursable</span> <b class="text-lg">${money(s.total_reimbursable)}</b></div>
  </div>`;
}
function citationHtml(c){
  const ok = c.verified;
  return `<div class="mt-1 text-xs">
    <span class="inline-block px-1.5 py-0.5 rounded ${ok?'bg-emerald-100 text-emerald-700':'bg-rose-100 text-rose-700'}">
      ${ok?'✓ verified':'✗ unverified'}</span>
    <span class="font-medium">${esc(c.doc_id)} §${esc(c.section)}</span>
    <span class="text-slate-500 italic">“${esc((c.quote||'').slice(0,200))}${(c.quote||'').length>200?'…':''}”</span>
  </div>`;
}
function lineItemCard(li){
  const m = vmeta(li.effective_verdict);
  const r = li.receipt || {};
  const overridden = li.system_verdict !== li.effective_verdict;
  return `<div class="bg-white rounded-lg shadow-sm border-l-4 ${m.card} p-4 mb-3">
    <div class="flex items-start justify-between gap-3">
      <div>
        <div class="flex items-center gap-2">
          <span class="inline-flex items-center gap-1 text-xs font-semibold px-2 py-0.5 rounded-full border ${m.badge}">
            <span class="w-1.5 h-1.5 rounded-full ${m.dot}"></span>${m.label}</span>
          <span class="font-medium">${esc(r.vendor||li.filename)}</span>
          <span class="text-xs text-slate-400">${esc(r.category||"")}${r.meal_type? " · "+esc(r.meal_type):""}</span>
          ${overridden?`<span class="text-xs text-blue-600">(overridden from ${esc(li.system_verdict)})</span>`:""}
        </div>
        <div class="text-xs text-slate-500 mt-0.5">${esc(li.filename)} · ${esc(r.city||"")} · ${esc(r.date||"")}</div>
      </div>
      <div class="text-right text-sm">
        <div class="text-slate-400 text-xs">total ${money(r.total)}</div>
        <div class="font-semibold">${money(li.reimbursable_amount)} <span class="text-xs text-slate-400">reimb.</span></div>
        <div class="text-xs text-slate-400">conf ${(li.confidence*100|0)}%</div>
      </div>
    </div>
    <p class="text-sm mt-2 text-slate-700">${esc(li.reasoning)}</p>
    ${(li.issues||[]).length?`<div class="mt-1 flex flex-wrap gap-1">${li.issues.map(i=>`<span class="text-xs bg-slate-100 px-1.5 py-0.5 rounded">${esc(i)}</span>`).join("")}</div>`:""}
    <div class="mt-2">${(li.citations||[]).map(citationHtml).join("")}</div>
    ${(li.overrides||[]).length?`<div class="mt-2 border-t pt-2 text-xs text-slate-600">
      <b>Override history:</b>${li.overrides.map(o=>`<div>→ ${esc(o.new_verdict)} — “${esc(o.comment)}” <span class="text-slate-400">(${esc(o.reviewer)}, ${new Date(o.created_at).toLocaleString()})</span></div>`).join("")}</div>`:""}
    <div class="mt-2 text-right">
      <button onclick='openOverride(${li.id}, ${JSON.stringify(esc(r.vendor||li.filename))})'
        class="text-xs px-2 py-1 rounded border hover:bg-slate-50">Override…</button>
    </div>
  </div>`;
}
function renderSubmission(s){
  let html = summaryBar(s);
  if(s.errors?.length) html += `<div class="bg-rose-50 border border-rose-200 rounded p-3 mb-3 text-sm text-rose-700">
    <b>Some files couldn't be processed:</b>${s.errors.map(e=>`<div class="mt-1">• <b>${esc(e.file)}</b> — ${esc(e.error||'unknown error')}</div>`).join("")}</div>`;
  html += (s.line_items||[]).map(lineItemCard).join("");
  return html;
}

// ---------- override dialog ----------
let overrideTarget = null, inNewView = false;
function openOverride(id, vendor){ overrideTarget=id; $("#ovl-sub").textContent="Item: "+vendor; $("#ovl").classList.remove("hidden"); }
function closeOverride(){ $("#ovl").classList.add("hidden"); $("#ovl-comment").value=""; }
async function submitOverride(){
  const comment = $("#ovl-comment").value.trim();
  if(!comment){ alert("A comment is required for the audit trail."); return; }
  await api(`/api/line-items/${overrideTarget}/override`,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({new_verdict:$("#ovl-verdict").value, comment})});
  closeOverride();
  // Re-render in place from the persisted record (no page reload).
  if(inNewView){
    const s = await api(`/api/submissions/${currentSubId}`);
    $("#results").innerHTML = renderSubmission(s);
  } else {
    openSubmission(currentSubId);
  }
}

// ---------- history ----------
let currentSubId = null;
async function loadHistory(){
  const emps = employees.length?employees:await api("/api/employees"); employees=emps;
  $("#view-history").innerHTML = `
    <div class="bg-white rounded-lg shadow-sm p-4 mb-4 flex flex-wrap gap-3 items-end text-sm">
      <div><label class="block text-xs text-slate-500">Employee</label>
        <select id="h-emp" class="border rounded-md p-1.5"><option value="">All</option>${emps.map(empOption).join("")}</select></div>
      <div><label class="block text-xs text-slate-500">Status</label>
        <select id="h-status" class="border rounded-md p-1.5">
          <option value="">All</option><option>reviewed</option><option>reviewed_with_errors</option><option>processing</option><option>error</option></select></div>
      <button id="h-refresh" class="px-3 py-1.5 rounded-md bg-slate-900 text-white">Filter</button>
    </div>
    <div id="h-list"></div><div id="h-detail" class="mt-4"></div>`;
  $("#h-refresh").onclick = refreshHistory; refreshHistory();
}
async function refreshHistory(){
  const emp = $("#h-emp").value, st = $("#h-status").value;
  const q = new URLSearchParams(); if(emp) q.set("employee_pk",emp); if(st) q.set("status",st);
  const subs = await api("/api/submissions?"+q.toString());
  $("#h-list").innerHTML = subs.length ? subs.map(s=>`
    <div class="bg-white rounded-lg shadow-sm p-3 mb-2 flex items-center gap-4 text-sm cursor-pointer hover:bg-slate-50"
         onclick="openSubmission(${s.id})">
      <div class="font-medium">${esc(s.employee?.name||"—")}</div>
      <div class="text-slate-400 text-xs">${new Date(s.created_at).toLocaleString()}</div>
      <div class="text-xs px-2 py-0.5 rounded bg-slate-100">${esc(s.status)}</div>
      <div class="text-xs">${s.line_item_count} items</div>
      <div class="text-xs ${s.flagged_count?'text-amber-700 font-semibold':'text-slate-400'}">${s.flagged_count} flagged</div>
      <div class="ml-auto font-semibold">${money(s.total_reimbursable)}</div>
    </div>`).join("") : `<p class="text-slate-400 text-sm">No submissions yet.</p>`;
  $("#h-detail").innerHTML = "";
}
async function openSubmission(id){
  currentSubId = id; inNewView = false;
  $("#h-detail").innerHTML = spinner("Loading…");
  const s = await api(`/api/submissions/${id}`);
  $("#h-detail").innerHTML = `<h3 class="font-semibold mb-2">Submission #${s.id}</h3>` + renderSubmission(s);
  $("#h-detail").scrollIntoView({behavior:"smooth"});
}

// ---------- policy Q&A ----------
function renderQA(){
  $("#view-qa").innerHTML = `
    <div class="bg-white rounded-lg shadow-sm p-5">
      <h2 class="font-semibold mb-2">Ask the policy library</h2>
      <p class="text-xs text-slate-500 mb-3">Grounded, cited answers. Out-of-scope questions are declined rather than guessed.</p>
      <div class="flex gap-2">
        <input id="q" class="flex-1 border rounded-md p-2 text-sm" placeholder="e.g. Can I expense alcohol on a solo trip?" />
        <button id="ask" class="px-4 py-2 rounded-md bg-slate-900 text-white text-sm">Ask</button>
      </div>
      <div id="ans" class="mt-4"></div>
    </div>`;
  $("#ask").onclick = ask; $("#q").addEventListener("keydown",e=>{if(e.key==="Enter")ask();});
}
async function ask(){
  const q = $("#q").value.trim(); if(!q) return;
  $("#ans").innerHTML = spinner("Searching the policy library…");
  try{
    const a = await api("/api/policy/ask",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({question:q})});
    const refused = a.refused;
    $("#ans").innerHTML = `
      <div class="rounded-md p-4 ${refused?'bg-slate-50 border border-slate-200':'bg-emerald-50 border border-emerald-200'}">
        <div class="text-xs mb-1 ${refused?'text-slate-500':'text-emerald-700'}">${refused?'Out of scope — declined':'Answer · confidence '+(a.confidence*100|0)+'%'}</div>
        <p class="text-sm">${esc(a.answer)}</p>
        <div class="mt-2">${(a.citations||[]).map(citationHtml).join("")}</div>
      </div>`;
  }catch(e){ $("#ans").innerHTML = errorBox(e.message); }
}

// ---------- boot ----------
(async function(){
  try { await renderNew(); renderQA(); showTab("new"); }
  catch(e){ $("#view-new").innerHTML = errorBox("Could not reach the API. Is the server running?\n"+e.message); showTab("new"); }
})();
</script>
</body>
</html>
